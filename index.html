    { text: "cat",   subtype: "noun", agreement: "3rd-singular", singular: "cat",   plural: "cats",   countable: true  },
    { text: "orca",  subtype: "noun", agreement: "3rd-singular", singular: "orca",  plural: "orcas",  countable: true  },
    { text: "bird",  subtype: "noun", agreement: "3rd-singular", singular: "bird",  plural: "birds",  countable: true  },
    { text: "water", subtype: "noun", agreement: "3rd-singular", singular: "water", plural: "waters", uncountable: true },
    { text: "tree",  subtype: "noun", agreement: "3rd-singular", singular: "tree",  plural: "trees",  countable: true  },
    { text: "kids",  subtype: "noun", agreement: "3rd-plural",   singular: "kid",   plural: "kids"   },
    { text: "ball",  subtype: "noun", agreement: "3rd-singular", singular: "ball",  plural: "balls",  countable: true  },
    { text: "fish",  subtype: "noun", agreement: "3rd-singular", singular: "fish",  plural: "fish", uncountable: true },
    { text: "sun",   subtype: "noun", agreement: "3rd-singular", singular: "sun",   plural: "suns",   countable: true  },
  ],
  pronouns: [
    { text: "I",    subtype: "pronoun", agreement: "1st-singular" },
    { text: "me",   subtype: "pronoun", agreement: "1st-singular" },
    { text: "we",   subtype: "pronoun", agreement: "1st-plural" },
    { text: "you",  subtype: "pronoun", agreement: "2nd" },
    { text: "he",   subtype: "pronoun", agreement: "3rd-singular" },
    { text: "she",  subtype: "pronoun", agreement: "3rd-singular" },
    { text: "it",   subtype: "pronoun", agreement: "3rd-singular" },
    { text: "they", subtype: "pronoun", agreement: "3rd-plural" },
  ],
  verbs: [
    { text: "run",   subtype: "verb-intransitive", forms: { "1st-singular":"run",  "3rd-singular":"runs",  "3rd-plural":"run",  "1st-plural":"run",  "2nd":"run",  "default":"run"  } },
    { text: "swim",  subtype: "verb-intransitive", forms: { "1st-singular":"swim", "3rd-singular":"swims", "3rd-plural":"swim", "1st-plural":"swim", "2nd":"swim", "default":"swim" } },
    { text: "jump",  subtype: "verb-intransitive", forms: { "1st-singular":"jump", "3rd-singular":"jumps", "3rd-plural":"jump", "1st-plural":"jump", "2nd":"jump", "default":"jump" } },
    { text: "sleep", subtype: "verb-intransitive", forms: { "1st-singular":"sleep","3rd-singular":"sleeps","3rd-plural":"sleep","1st-plural":"sleep","2nd":"sleep","default":"sleep"} },
    { text: "play",  subtype: "verb-intransitive", forms: { "1st-singular":"play", "3rd-singular":"plays", "3rd-plural":"play", "1st-plural":"play", "2nd":"play", "default":"play" } },
    { text: "kick",  subtype: "verb-transitive",   forms: { "1st-singular":"kick", "3rd-singular":"kicks", "3rd-plural":"kick", "1st-plural":"kick", "2nd":"kick", "default":"kick" } },
    { text: "eat",   subtype: "verb-transitive",   forms: { "1st-singular":"eat",  "3rd-singular":"eats",  "3rd-plural":"eat",  "1st-plural":"eat",  "2nd":"eat",  "default":"eat"  } },
    { text: "see",   subtype: "verb-transitive",   forms: { "1st-singular":"see",  "3rd-singular":"sees",  "3rd-plural":"see",  "1st-plural":"see",  "2nd":"see",  "default":"see"  } },
    { text: "chase", subtype: "verb-transitive",   forms: { "1st-singular":"chase","3rd-singular":"chases","3rd-plural":"chase","1st-plural":"chase","2nd":"chase","default":"chase"} },
    { text: "is",    subtype: "verb-linking",      forms: { "1st-singular":"am",   "3rd-singular":"is",    "3rd-plural":"are",  "1st-plural":"are",  "2nd":"are",  "default":"is"   } },
    { text: "feels", subtype: "verb-linking",      forms: { "1st-singular":"feel", "3rd-singular":"feels", "3rd-plural":"feel", "1st-plural":"feel", "2nd":"feel", "default":"feels"} },
  ],
  adverbs: [
    { text: "quickly",  subtype: "adverb" },
    { text: "slowly",   subtype: "adverb" },
    { text: "quietly",  subtype: "adverb" },
    { text: "happily",  subtype: "adverb" },
    { text: "always",   subtype: "adverb" },
    { text: "never",    subtype: "adverb" },
  ],
  prepositions: [
    { text: "in",   subtype: "preposition" },
    { text: "on",   subtype: "preposition" },
    { text: "by",   subtype: "preposition" },
    { text: "near", subtype: "preposition" },
    { text: "over", subtype: "preposition" },
  ],
  conjunctions: [
    { text: "and", subtype: "conjunction" },
    { text: "but", subtype: "conjunction" },
    { text: "so",  subtype: "conjunction" },
    { text: "or",  subtype: "conjunction" },
  ],
};

const LEVELS = [
  { level: 1, xpRequired: 0,   unlocks: ["nouns","verbs"],                  unlockLabel: "Nouns & Verbs",                     nextLabel: "Articles",                  punctUnlocks: ["."] },
  { level: 2, xpRequired: 5,   unlocks: ["articles"],                        unlockLabel: "Articles unlocked",                  nextLabel: "Milestone",                 punctUnlocks: [] },
  { level: 3, xpRequired: 20,  unlocks: [],                                  unlockLabel: "10 nouns & verbs mastered",          nextLabel: "Adjectives & Determiners",  punctUnlocks: [] },
  { level: 4, xpRequired: 45,  unlocks: ["adjectives","determiners"],        unlockLabel: "Adjectives & Determiners unlocked",  nextLabel: "! and ?",                   punctUnlocks: [] },
  { level: 5, xpRequired: 80,  unlocks: [],                                  unlockLabel: "! and ? unlocked",                   nextLabel: "Adverbs",                   punctUnlocks: ["!","?"] },
  { level: 6, xpRequired: 130, unlocks: ["adverbs"],                         unlockLabel: "Adverbs unlocked",                   nextLabel: "Prepositions",              punctUnlocks: [] },
  { level: 7, xpRequired: 200, unlocks: ["prepositions"],                    unlockLabel: "Prepositions unlocked",              nextLabel: "Conjunctions",              punctUnlocks: [] },
  { level: 8, xpRequired: 300, unlocks: ["conjunctions"],                    unlockLabel: "Conjunctions unlocked",              nextLabel: "",                          punctUnlocks: [","] },
];

const ALL_PUNCT = [".", "!", "?", ",", ";", ":", '"', "'", "(", ")", "—", "–", "…"];

const SCORE_VALUES = {
  "pronoun": 1, "noun": 4,
  "verb-intransitive": 1, "verb-transitive": 5, "verb-linking": 3,
  "article": 2, "determiner": 4,
  "adjective": 3, "adverb": 3,
  "preposition": 3, "conjunction": 5,
};

// ── PHYSICS CONSTANTS ──
const SNAP_DISTANCE        = 90;   // ~1 card width before snapping (avg block ~80px + gap)
const FIELD_DISTANCE       = 130;  // attract glow range
const REPEL_DISTANCE       = 56;
const JITTER_START         = 2.0;
const JITTER_DECAY         = 0.87;
const SPRING_DURATION      = 200;
const FIELD_BASE           = 0.7;
const FIELD_STRENGTH_SCALE = 0.15;
const FIELD_BLOCKED        = 0.5;
const SNAP_LINK_TOLERANCE  = 20;   // px — max extra gap for two words to still be considered snapped together
const EMPTY_RAIL_SCORE = 10;
const XP_BAR_TRANSITION_MS = 600; // must match .xp-bar-fill transition duration in CSS

// ═══════════════════════════════════════════════════
//  CONNECTION RULES
// ═══════════════════════════════════════════════════

function isNounType(t) { return t === 'noun' || t === 'pronoun'; }
function isVerbType(t) { return t === 'verb-intransitive' || t === 'verb-transitive' || t === 'verb-linking'; }

// Pure adjacency: is [leftType → rightType] valid?
function getConnectionResult(leftType, rightType) {
  // article / determiner → adjective or noun
  if ((leftType === 'article' || leftType === 'determiner') && rightType === 'adjective')   return { allowed: true, strength: 2 };
  if ((leftType === 'article' || leftType === 'determiner') && isNounType(rightType))       return { allowed: true, strength: 2 };

  // adjective → adjective (stacking) or noun
  if (leftType === 'adjective' && rightType === 'adjective')  return { allowed: true, strength: 1 };
  if (leftType === 'adjective' && isNounType(rightType))      return { allowed: true, strength: 2 };

  // noun / pronoun → any verb
  if (isNounType(leftType) && isVerbType(rightType))          return { allowed: true, strength: 3 };

  // transitive verb → article/determiner/noun/pronoun (direct object)
  if (leftType === 'verb-transitive' && (rightType === 'article' || rightType === 'determiner')) return { allowed: true, strength: 2 };
  if (leftType === 'verb-transitive' && isNounType(rightType))  return { allowed: true, strength: 2 };
  if (leftType === 'verb-transitive' && rightType === 'adjective') return { allowed: true, strength: 1 };

  // linking verb → adjective or noun (predicate adjective / nominative)
  if (leftType === 'verb-linking' && rightType === 'adjective')   return { allowed: true, strength: 2 };
  if (leftType === 'verb-linking' && (rightType === 'article' || rightType === 'determiner')) return { allowed: true, strength: 2 };
  if (leftType === 'verb-linking' && isNounType(rightType))       return { allowed: true, strength: 2 };

  // any verb → adverb
  if (isVerbType(leftType) && rightType === 'adverb')             return { allowed: true, strength: 1 };

  // adverb → verb (e.g. "quickly runs" — pre-verb adverb)
  if (leftType === 'adverb' && isVerbType(rightType))             return { allowed: true, strength: 1 };

  // hard block everything else
  return { allowed: false, strength: 0 };
}

function canConnect(draggedType, targetType, side) {
  const leftType  = side === 'right' ? draggedType : targetType;
  const rightType = side === 'right' ? targetType  : draggedType;
  return getConnectionResult(leftType, rightType);
}

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════

let state = {
  level: 1, xp: 0,
  unlockedTypes: new Set(),
  unlockedPunct: new Set(),
  vaultSentences: [],
  rails: [],
  activeRailId: 0,
  dragging: null,
  dragBlocked: false,
  physicsLoops: {},
  activeTab: 'nouns',
  tutorialPhase: null, // null | 'noun' | 'verb'
  idCounter: 0,
  inactivityTimer: null,
};

// ── PERSISTENCE ──
function saveState() {
  try {
    localStorage.setItem('word-things-v1', JSON.stringify({
      level: state.level, xp: state.xp,
      unlockedTypes: [...state.unlockedTypes],
      unlockedPunct: [...state.unlockedPunct],
      vaultSentences: state.vaultSentences,
      tutorialPhase: state.tutorialPhase,
    }));
  } catch(e) {}
}

function loadState() {
  if (DEV_MODE) {
    state.level = LEVELS.length; state.xp = 9999;
    Object.keys(WORD_BANK).forEach(k => state.unlockedTypes.add(k));
    ALL_PUNCT.forEach(p => state.unlockedPunct.add(p));
    state.tutorialPhase = null;
    return;
  }
  try {
    const raw = localStorage.getItem('word-things-v1');
    if (raw) {
      const save = JSON.parse(raw);
      state.level = save.level || 1;
      state.xp    = save.xp || 0;
      state.unlockedTypes = new Set(save.unlockedTypes || []);
      state.unlockedPunct = new Set(save.unlockedPunct || ["."]);
      state.vaultSentences = save.vaultSentences || [];
      state.tutorialPhase = save.tutorialPhase ?? null;

      const shouldRunTutorial = state.level === 1 && state.xp === 0 && state.vaultSentences.length === 0;
      if (shouldRunTutorial) {
        state.tutorialPhase = state.tutorialPhase || 'noun';
        state.unlockedTypes = new Set(["nouns", "verbs"]);
        state.unlockedPunct = new Set(["."]);
      }
    } else {
      applyLevelUnlocks(1);
      state.tutorialPhase = 'noun';
      state.activeTab = 'nouns';
    }
  } catch(e) { applyLevelUnlocks(1); state.tutorialPhase = 'noun'; }
}

function applyLevelUnlocks(level) {
  for (let i = 0; i < LEVELS.length; i++) {
    if (LEVELS[i].level <= level) {
      LEVELS[i].unlocks.forEach(u => state.unlockedTypes.add(u));
      LEVELS[i].punctUnlocks.forEach(p => state.unlockedPunct.add(p));
    }
  }
}

// ═══════════════════════════════════════════════════
//  RAIL MANAGEMENT
// ═══════════════════════════════════════════════════

function createRail() {
  const id = state.idCounter++;
  const rail = {
    id, words: [], isLocked: false,
    potentialScore: 0, jitterAmplitude: 0, scalePulse: 1,
    hasNoun: false, hasVerb: false, subjectAgreement: null,
    railOffset: RAIL_PADDING, // x-position of leftmost word on the rail
  };
  state.rails.push(rail);
  renderRails();
  return rail;
}

function getRailById(id) { return state.rails.find(r => r.id === id); }

function renderRails() {
  const container = document.getElementById('railsContainer');
  const existingIds = new Set(state.rails.map(r => r.id));
  container.querySelectorAll('.rail').forEach(el => {
    if (!existingIds.has(parseInt(el.dataset.railId))) el.remove();
  });
  state.rails.forEach(rail => {
    let railEl = document.getElementById(`rail-${rail.id}`);
    if (!railEl) {
      railEl = document.createElement('div');
      railEl.className = 'rail';
      railEl.id = `rail-${rail.id}`;
      railEl.dataset.railId = rail.id;
      container.appendChild(railEl);
    }
    updateScoreBadges(rail);
  });
}

function updateScoreBadges(rail) {
  const railEl = document.getElementById(`rail-${rail.id}`);
  if (!railEl) return;
  // Remove all existing dynamically-created score badges
  railEl.querySelectorAll('.score-badge').forEach(b => b.remove());
  if (rail.isLocked) return;

  const clusters = getSnapClusters(rail);
  clusters.forEach(cluster => {
    if (cluster.length < 2) return; // single word = 0 pts, no badge
    const hasN = cluster.some(w => isNounType(w.subtype));
    const hasV = cluster.some(w => isVerbType(w.subtype));
    let score = cluster.reduce((s, w) => s + (SCORE_VALUES[w.subtype] || 2), 0);
    if (hasN && hasV) score += 3;
    if (score === 0) return;

    const badge = document.createElement('div');
    badge.className = 'score-badge has-value';
    badge.textContent = `${score} pts`;

    const firstX  = cluster[0].x !== undefined ? cluster[0].x : RAIL_PADDING;
    const lastWord = cluster[cluster.length - 1];
    const lastEl   = document.getElementById(`block-${lastWord.id}`);
    const lastW    = lastEl ? (lastEl.offsetWidth || estimateBlockWidth(lastWord.displayText || lastWord.text))
                             : estimateBlockWidth(lastWord.displayText || lastWord.text);
    const lastX    = (lastWord.x !== undefined ? lastWord.x : RAIL_PADDING) + lastW;
    const centerX  = (firstX + lastX) / 2;
    badge.style.left      = `${centerX}px`;
    badge.style.transform = 'translateX(-50%)';
    railEl.appendChild(badge);
  });
}

// Returns array of arrays: each sub-array is a group of consecutive words whose
// x-positions indicate they are magnetically snapped together (gap ≈ BLOCK_GAP).
function getSnapClusters(rail) {
  if (rail.words.length === 0) return [];
  // Sort a copy by x position so free-dropped words in arbitrary order are handled
  const sorted = [...rail.words].sort((a, b) => (a.x !== undefined ? a.x : RAIL_PADDING) - (b.x !== undefined ? b.x : RAIL_PADDING));
  const clusters = [];
  let current = [sorted[0]];
  for (let i = 1; i < sorted.length; i++) {
    const prev = sorted[i - 1];
    const curr = sorted[i];
    const prevEl = document.getElementById(`block-${prev.id}`);
    const prevW = prevEl ? (prevEl.offsetWidth || estimateBlockWidth(prev.displayText || prev.text)) : estimateBlockWidth(prev.displayText || prev.text);
    const prevX = prev.x !== undefined ? prev.x : RAIL_PADDING;
    const currX = curr.x !== undefined ? curr.x : RAIL_PADDING;
    const expectedRight = prevX + prevW + BLOCK_GAP;
    if (currX <= expectedRight + SNAP_LINK_TOLERANCE) {
      current.push(curr);
    } else {
      clusters.push(current);
      current = [curr];
    }
  }
  clusters.push(current);
  return clusters;
}

function recalcRailScore(rail) {
  const clusters = getSnapClusters(rail);
  let total = 0;
  clusters.forEach(cluster => {
    if (cluster.length < 2) return; // single unlinked word = 0 pts
    const hasN = cluster.some(w => isNounType(w.subtype));
    const hasV = cluster.some(w => isVerbType(w.subtype));
    let score = cluster.reduce((s, w) => s + (SCORE_VALUES[w.subtype] || 2), 0);
    if (hasN && hasV) score += 3;
    total += score;
  });
  rail.potentialScore = total;
  updateScoreBadges(rail);
}

// ═══════════════════════════════════════════════════
//  WORD BLOCK DOM
// ═══════════════════════════════════════════════════

function getTypeClass(subtype) {
  if (subtype === 'pronoun' || subtype === 'noun') return 'type-noun';
  if (subtype === 'verb-intransitive' || subtype === 'verb-transitive') return 'type-verb';
  if (subtype === 'verb-linking') return 'type-verb-linking';
  return `type-${subtype}`;
}

function isLightText(subtype) {
  return ['adjective','adverb','article','determiner'].includes(subtype);
}

function createWordBlockEl(wordData, railId) {
  const el = document.createElement('div');
  el.className = `word-block ${getTypeClass(wordData.subtype)}`;
  if (isLightText(wordData.subtype)) el.classList.add('light-text');
  el.id = `block-${wordData.id}`;
  el.dataset.wordId = wordData.id;
  el.dataset.railId = railId;
  el.dataset.subtype = wordData.subtype;
  el.style.position = 'relative';
  const textSpan = document.createElement('span');
  textSpan.className = 'block-text';
  textSpan.textContent = wordData.displayText || wordData.text;
  el.appendChild(textSpan);

  // Add plural toggle for nouns that have singular/plural forms
  if (wordData.subtype === 'noun' && wordData.singular && wordData.plural && !wordData.uncountable) {
    const toggle = document.createElement('button');
    toggle.className = 'plural-toggle';
    const isPlural = wordData.agreement === '3rd-plural';
    toggle.textContent = isPlural ? 'PL' : 'SG';
    toggle.title = isPlural ? 'Switch to singular' : 'Switch to plural';
    toggle.addEventListener('mousedown', ev => ev.stopPropagation());
    toggle.addEventListener('touchstart', ev => ev.stopPropagation(), { passive: true });
    toggle.addEventListener('click', ev => {
      ev.stopPropagation();
      toggleNounNumber(wordData, railId);
    });
    el.appendChild(toggle);
  }
  return el;
}

function getBlockText(el) { return el.querySelector('.block-text'); }

// ═══════════════════════════════════════════════════
//  LAYOUT
// ═══════════════════════════════════════════════════

const BLOCK_GAP   = 8;
const RAIL_PADDING = 14;

function layoutRail(rail) {
  const railEl = document.getElementById(`rail-${rail.id}`);
  if (!railEl) return;
  const railH = 72;
  const blockH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--block-h')) || 48;
  const topOffset = (railH - blockH) / 2;
  // If any word lacks a stored x position, run the pack algorithm to assign them
  if (rail.words.some(w => w.x === undefined)) {
    let x = RAIL_PADDING;
    rail.words.forEach(wordData => {
      wordData.x = x;
      const el = document.getElementById(`block-${wordData.id}`);
      const w = el ? (el.offsetWidth || estimateBlockWidth(wordData.displayText || wordData.text)) : estimateBlockWidth(wordData.displayText || wordData.text);
      x += w + BLOCK_GAP;
    });
  }
  rail.words.forEach((wordData, idx) => {
    const el = document.getElementById(`block-${wordData.id}`);
    if (!el) return;
    el.style.left = `${wordData.x}px`;
    el.style.top  = `${topOffset}px`;
    applyAutoCapitalize(rail, wordData, idx);
  });
  updateScoreBadges(rail);
}

function applyAutoCapitalize(rail, wordData, idx) {
  const el = document.getElementById(`block-${wordData.id}`);
  if (!el) return;
  const span = el.querySelector('.block-text');
  if (!span) return;
  const baseText = wordData.displayText || wordData.text;
  if (idx === 0 && rail.words.length > 0) {
    // capitalize first letter if not already "I" (which is always caps)
    span.textContent = baseText.charAt(0).toUpperCase() + baseText.slice(1);
  } else {
    span.textContent = baseText;
  }
}

function estimateBlockWidth(text) { return text.length * 10 + 30; }

function layoutRailAnimated(rail) {
  const blockH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--block-h')) || 48;
  const railH = 72;
  const topOffset = (railH - blockH) / 2;
  // If any word lacks a stored x position, run the pack algorithm to assign them
  if (rail.words.some(w => w.x === undefined)) {
    let x = RAIL_PADDING;
    rail.words.forEach(wordData => {
      wordData.x = x;
      const el = document.getElementById(`block-${wordData.id}`);
      const w = el ? (el.offsetWidth || estimateBlockWidth(wordData.displayText || wordData.text)) : estimateBlockWidth(wordData.displayText || wordData.text);
      x += w + BLOCK_GAP;
    });
  }
  rail.words.forEach((wordData, idx) => {
    const el = document.getElementById(`block-${wordData.id}`);
    if (!el) return;
    el.style.transition = `left ${SPRING_DURATION}ms var(--spring), top ${SPRING_DURATION}ms var(--spring)`;
    el.style.left = `${wordData.x}px`;
    el.style.top  = `${topOffset}px`;
    setTimeout(() => { el.style.transition = ''; }, SPRING_DURATION + 50);
    applyAutoCapitalize(rail, wordData, idx);
  });
  updateScoreBadges(rail);
}

// ═══════════════════════════════════════════════════
//  PHYSICS — jitter / breathe
// ═══════════════════════════════════════════════════

function startJitter(railId) {
  const rail = getRailById(railId);
  if (!rail || rail.isLocked) return;
  // Only jitter the cluster that has both a noun and a verb — not every word on the rail
  const clusters = getSnapClusters(rail);
  const activeCluster = clusters.find(c =>
    c.length > 1 &&
    c.some(w => isNounType(w.subtype)) &&
    c.some(w => isVerbType(w.subtype))
  );
  if (!activeCluster) return;
  rail.jitterAmplitude = JITTER_START;
  rail.scalePulse = 1.025;
  if (state.physicsLoops[railId]) cancelAnimationFrame(state.physicsLoops[railId]);
  function loop() {
    const r = getRailById(railId);
    if (!r || r.isLocked) return;
    if (r.jitterAmplitude > 0.06 || r.scalePulse > 1) {
      const dx = Math.sin(Date.now() / 30) * r.jitterAmplitude;
      const dy = Math.cos(Date.now() / 45) * (r.jitterAmplitude * 0.1);
      activeCluster.forEach(w => {
        const el = document.getElementById(`block-${w.id}`);
        if (el) el.style.transform = `translate(${dx}px,${dy}px) scale(${r.scalePulse})`;
      });
      r.jitterAmplitude *= JITTER_DECAY;
      if (r.scalePulse > 1) { r.scalePulse -= 0.005; if (r.scalePulse < 1) r.scalePulse = 1; }
      state.physicsLoops[railId] = requestAnimationFrame(loop);
    } else {
      activeCluster.forEach(w => {
        const el = document.getElementById(`block-${w.id}`);
        if (el) { el.style.transform = 'translate(0,0) scale(1)'; el.classList.add('breathing'); }
      });
      delete state.physicsLoops[railId];
    }
  }
  state.physicsLoops[railId] = requestAnimationFrame(loop);
}

function stopJitter(railId) {
  if (state.physicsLoops[railId]) { cancelAnimationFrame(state.physicsLoops[railId]); delete state.physicsLoops[railId]; }
  const rail = getRailById(railId);
  if (!rail) return;
  rail.words.forEach(w => {
    const el = document.getElementById(`block-${w.id}`);
    if (el) el.style.transform = 'translate(0,0) scale(1)';
  });
}

// ═══════════════════════════════════════════════════
//  NOUN NUMBER TOGGLE
// ═══════════════════════════════════════════════════

function toggleNounNumber(wordData, railId) {
  const rail = getRailById(railId);
  if (!rail || rail.isLocked) return;

  const isCurrentlyPlural = wordData.agreement === '3rd-plural';
  const newAgreement = isCurrentlyPlural ? '3rd-singular' : '3rd-plural';
  const newText = isCurrentlyPlural ? wordData.singular : wordData.plural;

  wordData.agreement = newAgreement;
  wordData.text = newText;
  wordData.displayText = newText;

  // Update the block visually with morph flash
  const el = document.getElementById(`block-${wordData.id}`);
  if (el) {
    el.classList.add('morphing');
    // Update toggle label
    const toggle = el.querySelector('.plural-toggle');
    if (toggle) {
      toggle.textContent = newAgreement === '3rd-plural' ? 'PL' : 'SG';
      toggle.title = newAgreement === '3rd-plural' ? 'Switch to singular' : 'Switch to plural';
    }
    setTimeout(() => {
      const span = el.querySelector('.block-text');
      if (span) span.textContent = newText;
      el.classList.remove('morphing');
      // Re-apply capitalize if first word
      const idx = rail.words.findIndex(w => w.id === wordData.id);
      applyAutoCapitalize(rail, wordData, idx);
    }, 105);
  }

  // Re-derive rail agreement from this noun (noun drives the bus)
  updateRailAnalysis(rail);
}

// ═══════════════════════════════════════════════════
//  VERB AGREEMENT
// ═══════════════════════════════════════════════════

function updateVerbAgreement(rail) {
  function findNearestNounAgreement(words, startIdx, step) {
    for (let i = startIdx; i >= 0 && i < words.length; i += step) {
      if (isNounType(words[i].subtype)) return words[i].agreement;
    }
    return null;
  }

  rail.words.forEach((w, verbIdx) => {
    if (!isVerbType(w.subtype) || !w.forms) return;

    // Find nearest noun/pronoun to the left, then right, then fall back to rail agreement
    const agreement =
      findNearestNounAgreement(rail.words, verbIdx - 1, -1) ||
      findNearestNounAgreement(rail.words, verbIdx + 1,  1) ||
      rail.subjectAgreement;
    if (!agreement) return;

    const newForm = w.forms[agreement] || w.forms['default'] || w.text;
    if (newForm !== w.displayText) {
      w.displayText = newForm;
      const el = document.getElementById(`block-${w.id}`);
      if (el) {
        el.classList.add('morphing');
        setTimeout(() => {
          const span = getBlockText(el);
          if (span) span.textContent = newForm;
          el.classList.remove('morphing');
        }, 200);
      }
    }
  });
}

// ═══════════════════════════════════════════════════
//  PERIOD / PUNCT AVAILABILITY
// ═══════════════════════════════════════════════════

// A rail is "complete" (ready for terminal punctuation) if it has a noun+verb,
// ALL words form a single magnetically-snapped cluster, and article rules are satisfied.
function isRailComplete(rail) {
  if (rail.isLocked || !rail.hasNoun || !rail.hasVerb) return false;
  // All words must be part of one linked cluster — no detached words allowed
  const clusters = getSnapClusters(rail);
  if (clusters.length !== 1) return false;
  const subjectNoun = rail.words.find(w => w.subtype === 'noun');
  if (subjectNoun && subjectNoun.countable && subjectNoun.agreement === '3rd-singular') {
    const nounIdx = rail.words.findIndex(w => w.id === subjectNoun.id);
    const hasArticle = rail.words.slice(0, nounIdx).some(w => w.subtype === 'article' || w.subtype === 'determiner');
    if (!hasArticle) return false;
  }
  return true;
}

function checkPeriodAvailability() {
  const anyComplete = state.rails.some(r => isRailComplete(r));
  document.querySelectorAll('.punct-mark[data-punct="."]').forEach(el => {
    el.classList.remove('locked-mark');
    if (anyComplete) el.classList.add('dancing');
    else             el.classList.remove('dancing');
  });
}

// ═══════════════════════════════════════════════════
//  WORD BANK UI
// ═══════════════════════════════════════════════════

const TAB_ORDER  = ['articles','determiners','adjectives','nouns','pronouns','verbs','adverbs','prepositions','conjunctions'];
const TAB_LABELS = { articles:'Articles', determiners:'Determiners', adjectives:'Adjectives', nouns:'Nouns', pronouns:'Pronouns', verbs:'Verbs', adverbs:'Adverbs', prepositions:'Prepositions', conjunctions:'Conjunctions' };

function buildBankTabs() {
  const tabsEl = document.getElementById('bankTabs');
  tabsEl.innerHTML = '';
  TAB_ORDER.forEach(type => {
    const tab = document.createElement('button');
    tab.className = 'bank-tab' + (state.activeTab === type ? ' active' : '');
    tab.dataset.type = type;
    tab.textContent = TAB_LABELS[type];
    if (!DEV_MODE && !state.unlockedTypes.has(type)) tab.classList.add('locked-tab');
    tab.addEventListener('click', () => {
      if (!DEV_MODE && !state.unlockedTypes.has(type)) return;
      state.activeTab = type;
      buildBankTabs(); buildBankWords();
    });
    tabsEl.appendChild(tab);
  });
}

function buildBankWords() {
  const wordsEl = document.getElementById('bankWords');
  wordsEl.innerHTML = '';
  let wordsToRender = WORD_BANK[state.activeTab] || [];
  if (state.level === 1) {
    if (state.activeTab === 'nouns') {
      wordsToRender = [{ text: "I", subtype: "pronoun", agreement: "1st-singular" }];
    } else if (state.activeTab === 'verbs') {
      wordsToRender = WORD_BANK.verbs.filter(v => v.text === 'play');
    } else {
      wordsToRender = [];
    }
  }

  wordsToRender.forEach(wordData => {
    const el = document.createElement('div');
    el.className = `bank-word ${getTypeClass(wordData.subtype)}`;
    if (isLightText(wordData.subtype)) el.classList.add('light-text');
    el.textContent = wordData.text;
    el.dataset.subtype = wordData.subtype;
    el.addEventListener('mousedown', e => startDragFromBank(e, wordData, el));
    el.addEventListener('touchstart', e => startDragFromBank(e, wordData, el), { passive: false });
    wordsEl.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════
//  PUNCT TRAY
// ═══════════════════════════════════════════════════

function buildPunctTray() {
  const tray = document.getElementById('punctTray');
  while (tray.children.length > 1) tray.removeChild(tray.lastChild);
  ALL_PUNCT.forEach(p => {
    const el = document.createElement('div');
    el.className = 'punct-mark';
    el.dataset.punct = p;
    el.textContent = p;
    el.title = getPunctName(p);
    const isUnlocked = DEV_MODE || state.unlockedPunct.has(p);
    if (!isUnlocked) el.classList.add('locked-mark');
    if (isUnlocked) {
      el.addEventListener('mousedown', e => startDragPunct(e, p, el));
      el.addEventListener('touchstart', e => startDragPunct(e, p, el), { passive: false });
    }
    tray.appendChild(el);
  });
  checkPeriodAvailability();
}

function getPunctName(p) {
  const names = {'.':'Period','!':'Exclamation','?':'Question Mark',',':'Comma',';':'Semicolon',':':'Colon','"':'Quote',"'":'Apostrophe','(':'Open Paren',')':'Close Paren','—':'Em Dash','–':'En Dash','…':'Ellipsis'};
  return names[p] || p;
}

// ═══════════════════════════════════════════════════
//  DRAG — from bank
// ═══════════════════════════════════════════════════

function startDragFromBank(e, wordData, sourceEl) {
  e.preventDefault();
  clearInactivityTimer();
  _activateTouchMove();

  const pos  = getEventPos(e);
  const rect = sourceEl.getBoundingClientRect();
  const newWordData = { ...wordData, id: state.idCounter++, displayText: wordData.text };
  const el = document.createElement('div');
  el.className = `word-block ${getTypeClass(wordData.subtype)} dragging`;
  if (isLightText(wordData.subtype)) el.classList.add('light-text');
  el.id = `block-${newWordData.id}`;
  el.style.left = `${rect.left}px`;
  el.style.top  = `${rect.top}px`;
  el.style.position = 'fixed';
  el.style.zIndex = '9000';
  const textSpan = document.createElement('span');
  textSpan.className = 'block-text';
  textSpan.textContent = newWordData.displayText;
  el.appendChild(textSpan);
  document.body.appendChild(el);
  state.dragging = { el, wordData: newWordData, offsetX: pos.x - rect.left, offsetY: pos.y - rect.top, fromBank: true, sourceRailId: null };
  state.dragBlocked = false;
}

// ─── DRAG — punct ───
function startDragPunct(e, punct, sourceEl) {
  e.preventDefault();
  clearInactivityTimer();
  _activateTouchMove();
  const pos  = getEventPos(e);
  const rect = sourceEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'punct-mark';
  el.style.position = 'fixed';
  el.style.left = `${rect.left}px`;
  el.style.top  = `${rect.top}px`;
  el.style.zIndex = '9000';
  el.style.cursor = 'grabbing';
  el.textContent = punct;
  el.dataset.punct = punct;
  document.body.appendChild(el);
  state.dragging = { el, isPunct: true, punct, offsetX: pos.x - rect.left, offsetY: pos.y - rect.top, fromBank: false, sourceRailId: null };
}

// ─── DRAG — from rail ───
function startDragFromRail(e, wordData, railId) {
  e.preventDefault();
  clearInactivityTimer();
  _activateTouchMove();
  const el = document.getElementById(`block-${wordData.id}`);
  if (!el) return;
  const pos  = getEventPos(e);
  const rect = el.getBoundingClientRect();
  const rail = getRailById(railId);
  if (!rail || rail.isLocked) return;
  const idx = rail.words.findIndex(w => w.id === wordData.id);
  if (idx === -1) return;

  // Store pending drag — we'll decide individual vs group on first move
  state.dragging = {
    el, wordData, railId, idx,
    offsetX: pos.x - rect.left,
    offsetY: pos.y - rect.top,
    startX: pos.x, startY: pos.y,
    fromBank: false, sourceRailId: railId, sourceIndex: idx,
    pendingDirection: true, // not yet committed to a drag mode
    isGroupDrag: false,
  };
  state.dragBlocked = false;
}

function commitIndividualDrag(dragState) {
  const { el, wordData, railId, idx } = dragState;
  const rail = getRailById(railId);
  if (!rail || rail.isLocked) return false;
  const rect = el.getBoundingClientRect();
  rail.words.splice(idx, 1);
  updateRailAnalysis(rail);
  recalcRailScore(rail);
  layoutRailAnimated(rail);
  stopJitter(railId);
  el.style.position = 'fixed';
  el.style.left = `${rect.left}px`;
  el.style.top  = `${rect.top}px`;
  el.style.zIndex = '9000';
  el.classList.add('dragging');
  el.classList.remove('breathing');
  document.body.appendChild(el);
  dragState.pendingDirection = false;
  dragState.isGroupDrag = false;
  checkPeriodAvailability();
  return true;
}

function commitGroupDrag(dragState) {
  // Group drag: move all words on the rail together, keeping relative positions
  const rail = getRailById(dragState.railId);
  if (!rail || rail.isLocked) return false;
  dragState.pendingDirection = false;
  dragState.isGroupDrag = true;
  // Store initial x of each word for delta computation
  dragState.groupStartXMap = {};
  rail.words.forEach(w => { dragState.groupStartXMap[w.id] = w.x !== undefined ? w.x : RAIL_PADDING; });
  return true;
}

// ═══════════════════════════════════════════════════
//  REPULSION
// ═══════════════════════════════════════════════════

function calcRepulsion(x, y, el) {
  if (!state.dragging || state.dragging.isPunct) return null;
  const { wordData } = state.dragging;
  const elW  = el.offsetWidth || estimateBlockWidth(wordData.displayText || wordData.text);
  const blockH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--block-h')) || 48;
  const elCX = x + elW / 2;
  const elCY = y + blockH / 2;
  const minDist = elW + BLOCK_GAP;
  let totalDX = 0, totalDY = 0;
  state.rails.forEach(rail => {
    if (rail.isLocked) return;
    rail.words.forEach(w => {
      const targetEl = document.getElementById(`block-${w.id}`);
      if (!targetEl) return;
      const tRect = targetEl.getBoundingClientRect();
      const tCX = tRect.left + tRect.width / 2;
      const tCY = tRect.top  + tRect.height / 2;
      const side = elCX < tCX ? 'right' : 'left';
      const conn = canConnect(wordData.subtype, w.subtype, side);
      if (!conn.allowed) {
        const dist = Math.sqrt(Math.pow(elCX - tCX, 2) + Math.pow(elCY - tCY, 2));
        if (dist < minDist && dist > 0) {
          const push = minDist - dist;
          totalDX += ((elCX - tCX) / dist) * push;
          totalDY += ((elCY - tCY) / dist) * push;
        }
      }
    });
  });
  return (totalDX === 0 && totalDY === 0) ? null : { x: x + totalDX, y: y + totalDY };
}

// ═══════════════════════════════════════════════════
//  DRAG MOVE
// ═══════════════════════════════════════════════════

function onDragMove(e) {
  if (!state.dragging) return;
  const pos = getEventPos(e);
  if (e.cancelable) e.preventDefault();
  const { el, offsetX, offsetY } = state.dragging;

  // ── Pending direction: decide individual vs group drag ──
  if (state.dragging.pendingDirection) {
    const dx = Math.abs(pos.x - state.dragging.startX);
    const dy = pos.y - state.dragging.startY; // positive = down, negative = up
    const moved = Math.sqrt(dx*dx + (pos.y - state.dragging.startY)**2);
    if (moved < 6) return; // wait for intentional movement

    // Dragging UP = lift individual word
    // Dragging LEFT/RIGHT = move entire group
    if (dy < -8 || (Math.abs(dy) < 10 && dx < 8)) {
      // Vertical/upward intent → individual drag
      if (!commitIndividualDrag(state.dragging)) { state.dragging = null; return; }
    } else {
      // Horizontal intent or downward → group drag
      commitGroupDrag(state.dragging);
    }
  }

  // ── Group drag mode ──
  if (state.dragging.isGroupDrag) {
    const deltaX = pos.x - state.dragging.startX;
    const rail = getRailById(state.dragging.railId);
    if (!rail) { state.dragging = null; return; }
    rail.words.forEach(w => {
      w.x = Math.max(0, (state.dragging.groupStartXMap[w.id] !== undefined ? state.dragging.groupStartXMap[w.id] : RAIL_PADDING) + deltaX);
    });
    layoutRail(rail);
    return;
  }

  // ── Individual drag mode ──
  let newX = pos.x - offsetX;
  let newY = pos.y - offsetY;
  if (!state.dragging.isPunct) {
    const repelled = calcRepulsion(newX, newY, el);
    if (repelled) { newX = repelled.x; newY = repelled.y; }
  }
  el.style.left = `${newX}px`;
  el.style.top  = `${newY}px`;

  // Discard zone highlight
  const dz = document.getElementById('discardZone');
  const dr = dz.getBoundingClientRect();
  const cx = newX + (el.offsetWidth / 2);
  const cy = newY + (el.offsetHeight / 2);
  dz.classList.toggle('active-target', cx > dr.left && cx < dr.right && cy > dr.top && cy < dr.bottom);

  if (!state.dragging.isPunct) checkMagnetism(newX, newY, el);
  else checkPunctMagnetism(newX, newY);
}

// ═══════════════════════════════════════════════════
//  MAGNETISM
// ═══════════════════════════════════════════════════

function checkMagnetism(x, y, el) {
  document.querySelectorAll('.word-block.in-field-attract,.word-block.in-field-repel').forEach(b => b.classList.remove('in-field-attract','in-field-repel'));
  if (!state.dragging || state.dragging.isPunct) return;
  const { wordData } = state.dragging;
  const dragCX = x + (el.offsetWidth / 2);
  const dragCY = y + (el.offsetHeight / 2);
  state.dragBlocked = false;
  let bestRail = null, bestResult = null, bestScore = -Infinity;

  // Only check rails that have words — empty rails snap on drop only, not during drag
  state.rails.forEach(rail => {
    if (rail.isLocked || rail.words.length === 0) return;
    const railEl = document.getElementById(`rail-${rail.id}`);
    if (!railEl) return;
    const railRect = railEl.getBoundingClientRect();
    const railMidY = railRect.top + railRect.height / 2;
    if (Math.abs(dragCY - railMidY) > 38) return;

    rail.words.forEach(w => {
      const targetEl = document.getElementById(`block-${w.id}`);
      if (!targetEl) return;
      const tRect = targetEl.getBoundingClientRect();
      const tCX   = tRect.left + tRect.width / 2;
      const tCY   = tRect.top  + tRect.height / 2;
      const dist  = Math.sqrt(Math.pow(dragCX - tCX, 2) + Math.pow(dragCY - tCY, 2));
      const side  = dragCX < tCX ? 'right' : 'left';
      const conn  = canConnect(wordData.subtype, w.subtype, side);
      if (conn.allowed) {
        if (dist < FIELD_DISTANCE) {
          const score = conn.strength - dist / FIELD_DISTANCE;
          if (score > bestScore) { bestScore = score; bestRail = rail; bestResult = { type: 'word', word: w, targetEl, dist, side, conn }; }
        }
      } else {
        // Show repel glow for feedback, but don't block the drop
        if (dist < SNAP_DISTANCE) targetEl.classList.add('in-field-repel');
      }
    });
  });

  if (!bestRail || !bestResult) return;
  const { targetEl, dist } = bestResult;
  if (dist < FIELD_DISTANCE) targetEl.classList.add('in-field-attract');
  if (dist < SNAP_DISTANCE)  snapToRail(bestRail, bestResult);
}

function checkPunctMagnetism(x, y) {
  const el = state.dragging?.el;
  if (!el) return;
  const punct = state.dragging.punct;
  document.querySelectorAll('.word-block.in-field-attract').forEach(b => b.classList.remove('in-field-attract'));
  if (!['.','!','?'].includes(punct)) return;
  const dragCX = x + 16, dragCY = y + 16;
  state.rails.forEach(rail => {
    if (!isRailComplete(rail) || rail.words.length === 0) return;
    const last   = rail.words[rail.words.length - 1];
    const lastEl = document.getElementById(`block-${last.id}`);
    if (!lastEl) return;
    const lRect = lastEl.getBoundingClientRect();
    const dist  = Math.sqrt(Math.pow(dragCX - lRect.right, 2) + Math.pow(dragCY - (lRect.top + lRect.height / 2), 2));
    if (dist < FIELD_DISTANCE) lastEl.classList.add('in-field-attract');
    if (dist < SNAP_DISTANCE)  lockSentence(rail, punct);
  });
}

// ═══════════════════════════════════════════════════
//  SNAP TO RAIL
// ═══════════════════════════════════════════════════

function snapToRail(rail, result) {
  if (!state.dragging || state.dragging.isPunct) return;
  const { el, wordData } = state.dragging;
  state.dragging = null;
  document.querySelectorAll('.in-field-attract,.in-field-repel').forEach(b => b.classList.remove('in-field-attract','in-field-repel'));

  let insertIndex = rail.words.length;
  if (result && result.type === 'word') {
    const idx = rail.words.findIndex(w => w.id === result.word.id);
    if (idx !== -1) insertIndex = result.side === 'right' ? idx : idx + 1;
  }

  // Check validity at insert position
  const leftNeighbor  = insertIndex > 0 ? rail.words[insertIndex - 1] : null;
  const rightNeighbor = insertIndex < rail.words.length ? rail.words[insertIndex] : null;
  const leftOk  = !leftNeighbor  || getConnectionResult(leftNeighbor.subtype,  wordData.subtype).allowed;
  const rightOk = !rightNeighbor || getConnectionResult(wordData.subtype, rightNeighbor.subtype).allowed;
  const isValid = leftOk && rightOk;

  rail.words.splice(insertIndex, 0, wordData);
  updateRailAnalysis(rail);
  recalcRailScore(rail);

  if (state.tutorialPhase === 'noun' && isNounType(wordData.subtype)) {
    state.tutorialPhase = 'verb';
    state.activeTab = 'verbs';
    buildBankTabs();
    buildBankWords();
    setTimeout(wiggleVerbBank, 200);
    saveState();
  } else if (state.tutorialPhase === 'verb' && isVerbType(wordData.subtype)) {
    state.tutorialPhase = null;
    buildBankTabs();
    buildBankWords();
    saveState();
  }

  // Compute the dropped word's x position on the rail
  const railElForPos = document.getElementById(`rail-${rail.id}`);
  if (railElForPos) {
    if (result && result.type === 'word') {
      // Place adjacent to the target word
      const targetWordData = result.word;
      const targetX = targetWordData.x !== undefined ? targetWordData.x : RAIL_PADDING;
      const insertedW = el.offsetWidth || estimateBlockWidth(wordData.displayText || wordData.text);
      const targetW = result.targetEl.offsetWidth || estimateBlockWidth(targetWordData.displayText || targetWordData.text);
      if (result.side === 'right') {
        // Inserted to the LEFT of target
        wordData.x = Math.max(RAIL_PADDING, targetX - insertedW - BLOCK_GAP);
      } else {
        // Inserted to the RIGHT of target
        wordData.x = targetX + targetW + BLOCK_GAP;
      }
    } else {
      // No specific target (first word on empty rail) — use drop position
      const rRect = railElForPos.getBoundingClientRect();
      wordData.x = Math.max(RAIL_PADDING, parseFloat(el.style.left) - rRect.left);
    }
  } else {
    wordData.x = RAIL_PADDING;
  }

  const railEl = document.getElementById(`rail-${rail.id}`);
  el.style.position = 'absolute';
  el.style.zIndex   = '10';
  el.classList.remove('dragging');
  el.classList.add('snapped');
  el.dataset.railId = rail.id;
  railEl.appendChild(el);

  el.addEventListener('mousedown', ev => { if (!rail.isLocked) startDragFromRail(ev, wordData, rail.id); });
  el.addEventListener('touchstart', ev => { if (!rail.isLocked) startDragFromRail(ev, wordData, rail.id); }, { passive: false });

  layoutRailAnimated(rail);

  if (!isValid) {
    setTimeout(() => {
      el.classList.add('shaking');
      setTimeout(() => {
        el.classList.remove('shaking');
        shakeKickFromRail(wordData, rail, insertIndex);
      }, 400);
    }, 80);
  } else {
    setTimeout(() => {
      if (rail.hasNoun && rail.hasVerb) { startJitter(rail.id); checkPeriodAvailability(); }
    }, SPRING_DURATION + 50);
  }

  ensureEmptyRail();
  resetInactivityTimer();
}

function updateRailAnalysis(rail) {
  rail.hasNoun = rail.words.some(w => isNounType(w.subtype));
  rail.hasVerb = rail.words.some(w => isVerbType(w.subtype));
  // Noun drives agreement — prefer noun over pronoun if both present
  const nounWord    = rail.words.find(w => w.subtype === 'noun');
  const pronounWord = rail.words.find(w => w.subtype === 'pronoun');
  const subjectWord = nounWord || pronounWord;
  const newAgreement = subjectWord ? subjectWord.agreement : null;
  rail.subjectAgreement = newAgreement;
  if (newAgreement) updateVerbAgreement(rail);
}

function ensureEmptyRail() {
  if (!state.rails.some(r => r.words.length === 0 && !r.isLocked)) createRail();
}

// ═══════════════════════════════════════════════════
//  SHAKE-KICK (invalid drop rejection)
// ═══════════════════════════════════════════════════

function shakeKickFromRail(wordData, rail, insertIndex) {
  // Remove the word from the rail data
  const idx = rail.words.findIndex(w => w.id === wordData.id);
  if (idx === -1) { layoutRailAnimated(rail); ensureEmptyRail(); return; }
  rail.words.splice(idx, 1);
  updateRailAnalysis(rail); recalcRailScore(rail);

  const el = document.getElementById(`block-${wordData.id}`);
  if (!el) { layoutRailAnimated(rail); ensureEmptyRail(); return; }

  // Determine kick direction: away from the bad neighbor
  // After removal, original left neighbor is at insertIndex-1, right at insertIndex
  const leftNeighbor  = (insertIndex - 1 >= 0) ? rail.words[insertIndex - 1] : null;
  const rightNeighbor = (insertIndex   < rail.words.length) ? rail.words[insertIndex] : null;
  const leftBad  = leftNeighbor  && !getConnectionResult(leftNeighbor.subtype, wordData.subtype).allowed;
  const rightBad = rightNeighbor && !getConnectionResult(wordData.subtype, rightNeighbor.subtype).allowed;

  // Kick away from bad side; if both bad or ambiguous, kick right
  let kickDir = 1;
  if (rightBad && !leftBad) kickDir = -1;

  const KICK_PX = 90;

  // Lift block to fixed coords so it can animate freely
  const rect = el.getBoundingClientRect();
  el.style.position = 'fixed';
  el.style.left = `${rect.left}px`;
  el.style.top  = `${rect.top}px`;
  el.style.zIndex = '500';
  document.body.appendChild(el);

  // Re-layout the rail without this word
  layoutRailAnimated(rail);

  // Animate the kick outward then fade
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transition = `left 0.32s var(--spring), opacity 0.28s ease 0.08s, transform 0.32s ease`;
      el.style.left    = `${rect.left + kickDir * KICK_PX}px`;
      el.style.opacity = '0';
      el.style.transform = 'scale(0.82)';
      setTimeout(() => { el.remove(); ensureEmptyRail(); checkPeriodAvailability(); }, 420);
    });
  });
}

// ═══════════════════════════════════════════════════
//  LOCK SENTENCE
// ═══════════════════════════════════════════════════

function lockSentence(rail, punct) {
  if (!state.dragging) return;
  recalcRailScore(rail);
  const punctEl = state.dragging.el;
  state.dragging = null;
  document.querySelectorAll('.in-field-attract,.in-field-repel').forEach(b => b.classList.remove('in-field-attract','in-field-repel'));
  stopJitter(rail.id);
  rail.isLocked = true;
  const rawWords = rail.words.map(w => w.displayText || w.text);
  if (rawWords.length > 0) rawWords[0] = rawWords[0].charAt(0).toUpperCase() + rawWords[0].slice(1);
  const sentenceText = rawWords.join(' ') + punct;
  const railEl = document.getElementById(`rail-${rail.id}`);

  // Attach the period to the rail, positioned after the last word
  if (railEl && rail.words.length > 0) {
    const lastWord = rail.words[rail.words.length - 1];
    const lastEl = document.getElementById(`block-${lastWord.id}`);
    const lastX = lastWord.x !== undefined ? lastWord.x : 0;
    const lastW = lastEl ? lastEl.offsetWidth : 0;
    const railH = 72;
    const punctSize = 32;
    punctEl.classList.remove('dragging', 'dancing');
    punctEl.style.position = 'absolute';
    punctEl.style.left = `${lastX + lastW + 5}px`;
    punctEl.style.top  = `${(railH - punctSize) / 2}px`;
    punctEl.style.zIndex = '';
    punctEl.style.cursor = 'default';
    railEl.appendChild(punctEl);
  }

  const xpEarned = rail.potentialScore;

  // a) Delay locking visual pulse by 500ms after punctuation snap
  setTimeout(() => {
    rail.words.forEach(w => {
      const el = document.getElementById(`block-${w.id}`);
      if (el) {
        el.style.transform = '';
        el.classList.remove('snapped', 'breathing');
        el.classList.add('locked', 'neon-pulsing');
      }
    });

    const flash = document.getElementById('lockFlash');
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 450);

    // Wait for neonPulse (620ms) then b) additional 1000ms before points tally
    setTimeout(() => {
      rail.words.forEach(w => {
        const el = document.getElementById(`block-${w.id}`);
        if (el) el.classList.remove('neon-pulsing');
      });

      setTimeout(() => {
        const xpPos = railEl ? railEl.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2 };
        showFloatingXP(xpEarned, xpPos.left + 40, xpPos.top);
        addPoints(xpEarned, { skipLevelCheck: true });

        // c) Check level-up 1000ms after the XP bar animation finishes
        setTimeout(() => {
          checkLevelUp();
        }, XP_BAR_TRANSITION_MS + 1000);

        // Clean up and move to vault after 750ms
        setTimeout(() => {
          addToVault(sentenceText, xpEarned);
          const idx = state.rails.findIndex(r => r.id === rail.id);
          if (idx !== -1) { state.rails.splice(idx, 1); railEl.remove(); renderRails(); }
          ensureEmptyRail();
          checkPeriodAvailability();
          saveState();
        }, 750);
      }, 1000);
    }, 620);
  }, 500);

  checkPeriodAvailability();
}

// ═══════════════════════════════════════════════════
//  DRAG END
// ═══════════════════════════════════════════════════

function onDragEnd(e) {
  _deactivateTouchMove();
  const dz = document.getElementById('discardZone');
  dz.classList.remove('active-target');
  document.querySelectorAll('.in-field-attract,.in-field-repel').forEach(b => b.classList.remove('in-field-attract','in-field-repel'));
  if (!state.dragging) return;

  // ── Pending direction: released before committing — treat as tap/no-op ──
  if (state.dragging.pendingDirection) {
    state.dragging = null; state.dragBlocked = false;
    resetInactivityTimer(); return;
  }

  // ── Group drag released ──
  if (state.dragging.isGroupDrag) {
    state.dragging = null; state.dragBlocked = false;
    resetInactivityTimer(); return;
  }

  const { el, fromBank, sourceRailId, sourceIndex, wordData, isPunct } = state.dragging;
  const pos   = getEventPos(e);
  const dRect = dz.getBoundingClientRect();
  const overDiscard = pos.x > dRect.left && pos.x < dRect.right && pos.y > dRect.top && pos.y < dRect.bottom;

  if (overDiscard && !isPunct) {
    el.style.transition = 'all 0.3s ease';
    el.style.transform  = 'scale(0)';
    el.style.opacity    = '0';
    setTimeout(() => el.remove(), 300);
    state.dragging = null; state.dragBlocked = false;
    resetInactivityTimer(); return;
  }

  if (isPunct) {
    el.style.transition = 'all 0.25s ease'; el.style.opacity = '0';
    setTimeout(() => el.remove(), 250);
    state.dragging = null; state.dragBlocked = false;
    checkPeriodAvailability(); return;
  }

  // Fallback: find what rail the word was dropped on by checking actual Y overlap
  const elTop = parseFloat(el.style.top);
  const blockH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--block-h')) || 48;
  const elCY   = elTop + blockH / 2;
  const elCX   = parseFloat(el.style.left) + (el.offsetWidth / 2);
  let targetRail = null, targetRailEl = null;

  // First pass: look for a rail the word is actually overlapping (tight Y match)
  state.rails.forEach(r => {
    if (r.isLocked) return;
    const rEl = document.getElementById(`rail-${r.id}`);
    if (!rEl) return;
    const rRect = rEl.getBoundingClientRect();
    const rCY = rRect.top + rRect.height / 2;
    // Must be within the rail's actual vertical band
    if (Math.abs(elCY - rCY) < 38) {
      targetRail = r; targetRailEl = rEl;
    }
  });

  state.dragging = null; state.dragBlocked = false;

  if (targetRail) {
    // Always allow dropping onto a rail — check validity after placement
    const dropX = parseFloat(el.style.left);
    const elW = el.offsetWidth || estimateBlockWidth(wordData.displayText || wordData.text);
    const dropXCenter = dropX + elW / 2;
    const rRect = targetRailEl.getBoundingClientRect();
    const dropRelX = Math.max(RAIL_PADDING, isNaN(dropX) ? RAIL_PADDING : dropX - rRect.left);
    const blockH2 = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--block-h')) || 48;
    const topOffset = (72 - blockH2) / 2;

    // Find best insert position by x proximity
    let insertIndex = targetRail.words.length;
    let bestDist = Infinity;
    let nearestWordIdx = -1;
    targetRail.words.forEach((w, i) => {
      const wEl = document.getElementById(`block-${w.id}`);
      if (!wEl) return;
      const wRect = wEl.getBoundingClientRect();
      const wCX = wRect.left + wRect.width / 2;
      const dist = Math.abs(dropXCenter - wCX);
      if (dist < bestDist) { bestDist = dist; nearestWordIdx = i; insertIndex = dropXCenter < wCX ? i : i + 1; }
    });

    // Compute wordData.x: snap to neighbor if within SNAP_DISTANCE, otherwise free drop
    if (targetRail.words.length === 0) {
      // Empty rail — place at drop position
      wordData.x = dropRelX;
    } else if (bestDist < SNAP_DISTANCE && nearestWordIdx !== -1) {
      // Close enough to snap — place immediately adjacent to nearest word
      const nearWord = targetRail.words[nearestWordIdx];
      const nearEl = document.getElementById(`block-${nearWord.id}`);
      const nearX = nearWord.x !== undefined ? nearWord.x : RAIL_PADDING;
      const nearW = nearEl ? (nearEl.offsetWidth || estimateBlockWidth(nearWord.displayText || nearWord.text)) : estimateBlockWidth(nearWord.displayText || nearWord.text);
      if (dropXCenter < (nearX + nearW / 2)) {
        // Insert before nearWord
        wordData.x = Math.max(RAIL_PADDING, nearX - elW - BLOCK_GAP);
        insertIndex = nearestWordIdx;
      } else {
        // Insert after nearWord
        wordData.x = nearX + nearW + BLOCK_GAP;
        insertIndex = nearestWordIdx + 1;
      }
    } else {
      // Free drop — sit at dropped position; compute order by x
      wordData.x = dropRelX;
      insertIndex = targetRail.words.length;
      targetRail.words.forEach((w, i) => {
        if (wordData.x > (w.x !== undefined ? w.x : RAIL_PADDING)) insertIndex = i + 1;
      });
    }

    // Check validity at chosen position
    const leftNeighbor  = insertIndex > 0 ? targetRail.words[insertIndex - 1] : null;
    const rightNeighbor = insertIndex < targetRail.words.length ? targetRail.words[insertIndex] : null;
    const leftOk  = !leftNeighbor  || getConnectionResult(leftNeighbor.subtype,  wordData.subtype).allowed;
    const rightOk = !rightNeighbor || getConnectionResult(wordData.subtype, rightNeighbor.subtype).allowed;
    const isValid = leftOk && rightOk;

    targetRail.words.splice(insertIndex, 0, wordData);
    updateRailAnalysis(targetRail); recalcRailScore(targetRail);
    el.style.position = 'absolute'; el.style.zIndex = '10';
    el.style.left = `${wordData.x}px`;
    el.style.top  = `${topOffset}px`;
    el.classList.remove('dragging'); el.classList.add('snapped');
    el.dataset.railId = targetRail.id;
    targetRailEl.appendChild(el);
    el.addEventListener('mousedown', ev => { if (!targetRail.isLocked) startDragFromRail(ev, wordData, targetRail.id); });
    el.addEventListener('touchstart', ev => { if (!targetRail.isLocked) startDragFromRail(ev, wordData, targetRail.id); }, { passive: false });
    // Update capitalization for all words now that order may have changed
    targetRail.words.forEach((w, idx) => applyAutoCapitalize(targetRail, w, idx));

    if (!isValid) {
      // Shake then magnetically kick sideways ~1 card-width from the bad neighbor
      setTimeout(() => {
        el.classList.add('shaking');
        setTimeout(() => {
          el.classList.remove('shaking');
          shakeKickFromRail(wordData, targetRail, insertIndex);
        }, 400);
      }, 80);
    } else {
      if (targetRail.hasNoun && targetRail.hasVerb) { setTimeout(() => startJitter(targetRail.id), SPRING_DURATION + 50); checkPeriodAvailability(); }
    }
    ensureEmptyRail(); resetInactivityTimer(); return;
  }

  // Return to source rail or fade out
  if (!fromBank && sourceRailId !== null) {
    const sourceRail = getRailById(sourceRailId);
    if (sourceRail && !sourceRail.isLocked) {
      const insertAt = (sourceIndex != null && sourceIndex >= 0 && sourceIndex <= sourceRail.words.length) ? sourceIndex : sourceRail.words.length;
      sourceRail.words.splice(insertAt, 0, wordData);
      updateRailAnalysis(sourceRail); recalcRailScore(sourceRail);
      const srcRailEl = document.getElementById(`rail-${sourceRailId}`);
      el.style.position = 'absolute'; el.style.zIndex = '10';
      el.classList.remove('dragging'); el.classList.add('snapped');
      srcRailEl.appendChild(el);
      el.addEventListener('mousedown', ev => { if (!sourceRail.isLocked) startDragFromRail(ev, wordData, sourceRailId); });
      el.addEventListener('touchstart', ev => { if (!sourceRail.isLocked) startDragFromRail(ev, wordData, sourceRailId); }, { passive: false });
      layoutRailAnimated(sourceRail);
      if (sourceRail.hasNoun && sourceRail.hasVerb) { setTimeout(() => startJitter(sourceRailId), SPRING_DURATION + 50); checkPeriodAvailability(); }
      ensureEmptyRail(); resetInactivityTimer(); return;
    }
  }

  // Fade out — word missed all rails
  el.style.transition = 'all 0.35s ease'; el.style.opacity = '0'; el.style.transform = 'scale(0.8)';
  setTimeout(() => el.remove(), 350);
  ensureEmptyRail(); resetInactivityTimer();
}

// ═══════════════════════════════════════════════════
//  VAULT
// ═══════════════════════════════════════════════════

function addToVault(text, xp) {
  const entry = { text, xp, timestamp: Date.now() };
  state.vaultSentences.unshift(entry);
  const vaultEl = document.getElementById('vaultSentences');
  const emptyEl = vaultEl.querySelector('.vault-empty');
  if (emptyEl) emptyEl.remove();
  const entryEl = document.createElement('div');
  entryEl.className = 'vault-entry new';
  entryEl.innerHTML = `<div>${text}</div><div class="vault-entry-xp">+${xp} pts</div>`;
  entryEl.addEventListener('click', () => pullFromVault(entry, entryEl));
  vaultEl.insertBefore(entryEl, vaultEl.firstChild);
  document.getElementById('vaultCount').textContent = `${state.vaultSentences.length} sentence${state.vaultSentences.length !== 1 ? 's' : ''}`;
}

function pullFromVault(entry, entryEl) {
  const text = entry.text;
  const lastChar = text[text.length - 1];
  const terminalPunct = ['.','!','?'].includes(lastChar) ? lastChar : null;
  const cleanText = terminalPunct ? text.slice(0, -1) : text;
  const words = cleanText.split(' ');
  const rail  = createRail();
  const railEl = document.getElementById(`rail-${rail.id}`);
  words.forEach(word => {
    const wordData = { id: state.idCounter++, text: word, displayText: word, subtype: 'noun' };
    rail.words.push(wordData);
    const el = createWordBlockEl(wordData, rail.id);
    el.style.opacity = '0.65';
    el.style.position = 'absolute';
    railEl.appendChild(el);
    el.addEventListener('mousedown', ev => { if (!rail.isLocked) startDragFromRail(ev, wordData, rail.id); });
    el.addEventListener('touchstart', ev => { if (!rail.isLocked) startDragFromRail(ev, wordData, rail.id); }, { passive: false });
  });
  updateRailAnalysis(rail);
  setTimeout(() => layoutRail(rail), 50);
  state.vaultSentences = state.vaultSentences.filter(e => e.timestamp !== entry.timestamp);
  entryEl.remove();
  document.getElementById('vaultCount').textContent = `${state.vaultSentences.length} sentence${state.vaultSentences.length !== 1 ? 's' : ''}`;
  if (state.vaultSentences.length === 0) document.getElementById('vaultSentences').innerHTML = '<div class="vault-empty">Your sentences will collect here.<br>Build something.</div>';
  startJitter(rail.id);
  saveState();
}

// ═══════════════════════════════════════════════════
//  XP & LEVELING
// ═══════════════════════════════════════════════════

function addPoints(amount, { skipLevelCheck = false } = {}) {
  if (DEV_MODE) return;
  state.xp += amount;
  updateXPBar(); if (!skipLevelCheck) checkLevelUp(); saveState();
}

function updateXPBar() {
  const cur  = LEVELS.find(l => l.level === state.level) || LEVELS[0];
  const next = LEVELS.find(l => l.level === state.level + 1);
  const xpMin = cur.xpRequired;
  const xpMax = next ? next.xpRequired : xpMin + 100;

  // ── Header labels ──
  document.getElementById('levelLabel').textContent = `Level ${state.level}`;
  if (next) {
    const nextName = cur.nextLabel || next.unlockLabel;
    document.getElementById('xpLabel').textContent = `${nextName} (${next.xpRequired} pts)`;
  } else {
    document.getElementById('xpLabel').textContent = '🏆 MAX';
  }

  // ── Full-width strip fill + hashmarks ──
  const stripFill  = document.getElementById('ptsStripFill');
  const stripTrack = document.getElementById('ptsStripTrack');
  if (!stripFill || !stripTrack) return;

  // Remove old hashmarks
  stripTrack.querySelectorAll('.pts-hashmark').forEach(h => h.remove());

  let pct;
  const lv3 = LEVELS.find(l => l.level === 3);
  const lv4 = LEVELS.find(l => l.level === 4);

  if (state.level === 2 && lv3 && lv4) {
    // Level 2: scale bar to Level-4 threshold; show hashmarks at Lv3 and Lv4
    const scaleMax = lv4.xpRequired;
    pct = Math.min(state.xp / scaleMax, 1);

    const pct3 = (lv3.xpRequired / scaleMax) * 100;
    const pct4 = 100;

    const h3 = document.createElement('div');
    h3.className = 'pts-hashmark';
    h3.style.left = `${pct3}%`;
    h3.innerHTML = '<div class="pts-hash-line"></div><div class="pts-hash-label">🔓 Adjectives (Lv.3)</div>';
    stripTrack.appendChild(h3);

    const h4 = document.createElement('div');
    h4.className = 'pts-hashmark';
    h4.style.left = `${pct4}%`;
    h4.innerHTML = '<div class="pts-hash-line"></div><div class="pts-hash-label">Lv.4</div>';
    stripTrack.appendChild(h4);
  } else {
    pct = next ? Math.min((state.xp - xpMin) / (xpMax - xpMin), 1) : 1;
  }

  stripFill.style.width = `${pct * 100}%`;
  // Keep the (now-hidden) header fill in sync too
  const headerFill = document.getElementById('xpFill');
  if (headerFill) headerFill.style.width = `${pct * 100}%`;
}

function checkLevelUp() {
  const next = LEVELS.find(l => l.level === state.level + 1);
  if (!next || state.xp < next.xpRequired) return;

  // Capture what is currently unlocked before upgrading
  const prevTypes = new Set(state.unlockedTypes);
  const prevPunct = new Set(state.unlockedPunct);

  state.level = next.level;
  applyLevelUnlocks(state.level);
  buildBankTabs(); buildBankWords(); buildPunctTray();

  // Record newly unlocked items for the happy-twirl celebration after overlay dismiss
  pendingUnlockAnimation.types = new Set([...state.unlockedTypes].filter(t => !prevTypes.has(t)));
  pendingUnlockAnimation.puncts = new Set([...state.unlockedPunct].filter(p => !prevPunct.has(p)));

  // Wait for the XP bar fill transition before showing the overlay
  setTimeout(() => showLevelUp(next), XP_BAR_TRANSITION_MS);
}

function showLevelUp(levelDef) {
  document.getElementById('levelUpNum').textContent   = levelDef.level;
  document.getElementById('levelUpUnlock').textContent = levelDef.unlockLabel;
  document.getElementById('levelUpOverlay').classList.add('show');
}

function dismissLevelUp() {
  document.getElementById('levelUpOverlay').classList.remove('show');

  // Apply happy-twirl to newly unlocked bank tabs and punct marks
  pendingUnlockAnimation.types.forEach(type => {
    const tab = document.querySelector(`.bank-tab[data-type="${type}"]`);
    if (tab) { tab.classList.add('happy-twirl'); setTimeout(() => tab.classList.remove('happy-twirl'), 800); }
  });
  pendingUnlockAnimation.puncts.forEach(punct => {
    document.querySelectorAll(`.punct-mark[data-punct="${punct}"]`).forEach(el => {
      el.classList.add('happy-twirl');
      setTimeout(() => el.classList.remove('happy-twirl'), 800);
    });
  });
  pendingUnlockAnimation = { types: new Set(), puncts: new Set() };
}

function showFloatingXP(amount, x, y) {
  const el = document.createElement('div');
  el.className = 'floating-xp';
  el.textContent = `+${amount} pts`;
  el.style.left = `${x}px`; el.style.top = `${y}px`;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.classList.add('animate'); setTimeout(() => el.remove(), 900); });
}

// ═══════════════════════════════════════════════════
//  DEV MODE TOGGLE
// ═══════════════════════════════════════════════════

function toggleDevMode() {
  DEV_MODE = !DEV_MODE;
  localStorage.setItem('word-things-dev', DEV_MODE ? 'true' : 'false');
  state.level = 1; state.xp = 0;
  state.unlockedTypes = new Set(); state.unlockedPunct = new Set();
  loadState(); buildBankTabs(); buildBankWords(); buildPunctTray(); updateXPBar();
  document.getElementById('devBadge').classList.toggle('dev-off', !DEV_MODE);
}

// ═══════════════════════════════════════════════════
//  HARD RESET
// ═══════════════════════════════════════════════════

function hardReset() {
  if (!confirm('Hard Reset: erase all progress and return to Level 1?\nThis cannot be undone.')) return;
  localStorage.removeItem('word-things-v1');
  localStorage.removeItem('word-things-dev');
  window.location.reload();
}

// ═══════════════════════════════════════════════════
//  INACTIVITY WIGGLE
// ═══════════════════════════════════════════════════

function resetInactivityTimer() {
  clearInactivityTimer();
  const wiggleFn = state.tutorialPhase === 'verb' ? wiggleVerbBank : wiggleNounBank;
  state.inactivityTimer = setInterval(wiggleFn, 3000);
}
function clearInactivityTimer() {
  if (state.inactivityTimer) { clearInterval(state.inactivityTimer); state.inactivityTimer = null; }
}
function wiggleNounBank() {
  // Don't wiggle if a noun/pronoun is already on a rail — the drawer has done its job
  const hasNounOnRail = state.rails.some(r => !r.isLocked && r.words.some(w => isNounType(w.subtype)));
  if (hasNounOnRail) return;
  const nounTab = document.querySelector('.bank-tab[data-type="nouns"]');
  if (nounTab) { nounTab.classList.add('wiggling'); setTimeout(() => nounTab.classList.remove('wiggling'), 700); }
  const firstWord = document.querySelector('.bank-word');
  if (firstWord) { firstWord.classList.add('wiggling'); setTimeout(() => firstWord.classList.remove('wiggling'), 700); }
}

function wiggleVerbBank() {
  const verbTab = document.querySelector('.bank-tab[data-type="verbs"]');
  if (verbTab) { verbTab.classList.add('wiggling'); setTimeout(() => verbTab.classList.remove('wiggling'), 700); }
  const firstWord = document.querySelector('.bank-word');
  if (firstWord) { firstWord.classList.add('wiggling'); setTimeout(() => firstWord.classList.remove('wiggling'), 700); }
}

// ═══════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════

function getEventPos(e) {
  if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

window.addEventListener('mousemove', onDragMove);
window.addEventListener('mouseup',   onDragEnd);
window.addEventListener('touchend',  onDragEnd);

function _activateTouchMove()   { window.addEventListener('touchmove', onDragMove, { passive: false }); }
function _deactivateTouchMove() { window.removeEventListener('touchmove', onDragMove, { passive: false }); }

// ═══════════════════════════════════════════════════
//  COLD OPEN
// ═══════════════════════════════════════════════════

function coldOpen() {
  document.getElementById('devBadge').classList.toggle('dev-off', !DEV_MODE);
  createRail();
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════

function init() {
  loadState(); buildBankTabs(); buildBankWords(); buildPunctTray(); coldOpen(); updateXPBar(); resetInactivityTimer();
  if (state.vaultSentences.length > 0) {
    const vaultEl = document.getElementById('vaultSentences');
    vaultEl.innerHTML = '';
    state.vaultSentences.forEach(entry => {
      const entryEl = document.createElement('div');
      entryEl.className = 'vault-entry';
      entryEl.innerHTML = `<div>${entry.text}</div><div class="vault-entry-xp">+${entry.xp} pts</div>`;
      entryEl.addEventListener('click', () => pullFromVault(entry, entryEl));
      vaultEl.appendChild(entryEl);
    });
    document.getElementById('vaultCount').textContent = `${state.vaultSentences.length} sentence${state.vaultSentences.length !== 1 ? 's' : ''}`;
  }
}

window.addEventListener('load', init);
</script>
